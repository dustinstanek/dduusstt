    let currentFilter = 'all';
    let expandedSet = new Set();

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function setFilter(f) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      if (f === 'all') document.getElementById('btnAll').classList.add('active');
      else if (f === 'content') document.getElementById('btnHasContent').classList.add('active');
      else if (f === 'empty') document.getElementById('btnEmpty').classList.add('active');
      render();
    }

    function getFiltered() {
      const q = document.getElementById('searchBox').value.toLowerCase();
      return PAGES.filter((p, i) => {
        if (currentFilter === 'content' && p.chars === 0) return false;
        if (currentFilter === 'empty' && p.chars > 0) return false;
        if (q) {
          return p.title.toLowerCase().includes(q) ||
            p.purl.toLowerCase().includes(q) ||
            p.folder.toLowerCase().includes(q);
        }
        return true;
      });
    }

    function toggleExpand(idx) {
      if (expandedSet.has(idx)) expandedSet.delete(idx);
      else expandedSet.add(idx);
      render();
    }

    function expandAll() {
      getFiltered().forEach((_, i) => expandedSet.add(PAGES.indexOf(getFiltered()[i])));
      // actually add all visible
      getFiltered().forEach(p => expandedSet.add(PAGES.indexOf(p)));
      render();
    }

    function collapseAll() {
      expandedSet.clear();
      render();
    }

    function copyContent(idx) {
      const content = PAGES[idx].content;
      navigator.clipboard.writeText(content).then(() => {
        const btn = document.getElementById('copy-' + idx);
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 1500);
      });
    }

    function render() {
      const filtered = getFiltered();
      document.getElementById('countLabel').textContent = filtered.length + ' of ' + PAGES.length + ' pages';

      const tbody = document.getElementById('tableBody');
      let html = '';

      if (filtered.length === 0) {
        html = '<tr><td colspan="5" class="no-results">No pages match your filter.</td></tr>';
      }

      filtered.forEach((p, vi) => {
        const idx = PAGES.indexOf(p);
        const expanded = expandedSet.has(idx);
        const charsClass = p.chars === 0 ? 'chars-badge empty' : 'chars-badge';

        html += '<tr onclick="toggleExpand(' + idx + ')" style="cursor:pointer;">';
        html += '<td class="num">' + (vi + 1) + '</td>';
        html += '<td><span class="page-title">' + escapeHtml(p.title) + '</span><br><span class="page-purl">' + escapeHtml(p.purl) + '</span></td>';
        html += '<td><span class="page-folder">' + escapeHtml(p.folder) + '</span></td>';
        html += '<td><span class="' + charsClass + '">' + p.chars.toLocaleString() + '</span></td>';
        html += '<td><div class="actions-cell">';
        html += '<button class="copy-btn" id="copy-' + idx + '" onclick="event.stopPropagation();copyContent(' + idx + ')">Copy</button>';
        html += '<button class="expand-btn">' + (expanded ? '▾' : '▸') + '</button>';
        html += '</div></td>';
        html += '</tr>';

        html += '<tr class="code-row' + (expanded ? '' : ' hidden') + '">';
        html += '<td colspan="5"><pre>' + (p.content ? escapeHtml(p.content) : '(empty)') + '</pre></td>';
        html += '</tr>';
      });

      tbody.innerHTML = html;
    }

    document.getElementById('searchBox').addEventListener('input', render);
    setFilter('all');
  </script>
